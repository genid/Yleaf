<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" width="100" height="130">
  <defs>
    <linearGradient id="ygrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2c3e6b"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="leafgrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#80e89a"/>
      <stop offset="100%" stop-color="#2e8b47"/>
    </linearGradient>
    <filter id="ls" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <polygon points="4,4 22,4 50,52 28,52"  fill="url(#ygrad)"/>
  <polygon points="96,4 78,4 50,52 72,52" fill="url(#ygrad)"/>
  <rect x="41" y="52" width="18" height="72" rx="4" fill="url(#ygrad)"/>

  <!-- Leaf: ±20 from center -->
  <path d="M 50,7 C 70,14 70,48 50,56 C 30,48 30,14 50,7 Z"
        fill="url(#leafgrad)" filter="url(#ls)"/>
  <line x1="50" y1="8" x2="50" y2="55" stroke="#1a5c30" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M 50,22 C 44,27 41,35 39,44" stroke="#1a5c30" stroke-width="0.9" fill="none" stroke-linecap="round"/>
  <path d="M 50,36 C 45,40 43,46 41,52" stroke="#1a5c30" stroke-width="0.9" fill="none" stroke-linecap="round"/>
  <path d="M 50,22 C 56,27 59,35 61,44" stroke="#1a5c30" stroke-width="0.9" fill="none" stroke-linecap="round"/>
  <path d="M 50,36 C 55,40 57,46 59,52" stroke="#1a5c30" stroke-width="0.9" fill="none" stroke-linecap="round"/>
</svg>
