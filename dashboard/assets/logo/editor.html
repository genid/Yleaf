<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Yleaf Logo Editor</title>
<style>
  body { font-family: monospace; background: #111; color: #eee; display: flex; gap: 40px; padding: 30px; }
  svg { background: #1a2744; border-radius: 12px; }
  .controls { display: flex; flex-direction: column; gap: 8px; min-width: 260px; }
  label { display: flex; justify-content: space-between; gap: 10px; align-items: center; }
  input[type=range] { width: 160px; }
  .val { width: 30px; text-align: right; color: #8cf0a8; }
  h3 { margin: 12px 0 4px; color: #aaa; font-size: 11px; text-transform: uppercase; }
  textarea { width: 100%; height: 180px; font-size: 11px; background: #222; color: #ccc; border: 1px solid #444; margin-top: 8px; }
  button { background: #2e8b47; color: #fff; border: none; padding: 6px 14px; cursor: pointer; border-radius: 4px; margin-top: 4px; }
</style>
</head>
<body>

<svg id="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" width="300" height="390">
  <!-- Y -->
  <g id="y-shape" stroke="#1a3a5c" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline id="y-arms" points="12,10 50,56 88,10"/>
    <line id="y-stem" x1="50" y1="56" x2="50" y2="122"/>
  </g>
  <!-- Leaf -->
  <path id="leaf" fill="#4caf73" stroke="#2d7a44" stroke-width="1.5"/>
  <line id="midrib" stroke="#1f5c30" stroke-linecap="round"/>
  <g id="vein-group" stroke="#1f5c30" fill="none" stroke-linecap="round"></g>
</svg>

<div>
  <div class="controls">
    <h3>Y shape</h3>
    <label>Arm spread (x) <input type="range" id="armX" min="5" max="48" value="38"> <span class="val" id="varmX">38</span></label>
    <label>Arm top (y)   <input type="range" id="armY" min="2" max="40" value="10"> <span class="val" id="varmY">10</span></label>
    <label>Junction (y)  <input type="range" id="juncY" min="30" max="80" value="56"> <span class="val" id="vjuncY">56</span></label>
    <label>Stroke width  <input type="range" id="sw" min="4" max="16" value="9"> <span class="val" id="vsw">9</span></label>
    <label>Y color <input type="color" id="ycolor" value="#1a3a5c"></label>

    <h3>Leaf</h3>
    <label>Width (ctrl±) <input type="range" id="lw" min="5" max="45" value="20"> <span class="val" id="vlw">20</span></label>
    <label>Tip (y)       <input type="range" id="ltip" min="2" max="30" value="7"> <span class="val" id="vltip">7</span></label>
    <label>Fill color <input type="color" id="lfill" value="#4caf73"></label>
    <label>Show veins <input type="checkbox" id="show-veins" checked></label>

    <button onclick="copysvg()">Copy SVG</button>
    <textarea id="out" readonly></textarea>
  </div>
</div>

<script>
const ids = ['armX','armY','juncY','sw','lw','ltip'];
ids.forEach(id => {
  const el = document.getElementById(id);
  el.oninput = () => { document.getElementById('v'+id).textContent = el.value; draw(); };
});
['ycolor','lfill','show-veins'].forEach(id => document.getElementById(id).onchange = draw);

function draw() {
  const armX  = +document.getElementById('armX').value;
  const armY  = +document.getElementById('armY').value;
  const juncY = +document.getElementById('juncY').value;
  const sw    = +document.getElementById('sw').value;
  const lw    = +document.getElementById('lw').value;
  const ltip  = +document.getElementById('ltip').value;
  const yc    = document.getElementById('ycolor').value;
  const lc    = document.getElementById('lfill').value;
  const showV = document.getElementById('show-veins').checked;

  const cx = 50;
  const lbase = juncY;

  // Y
  document.getElementById('y-shape').setAttribute('stroke', yc);
  document.getElementById('y-shape').setAttribute('stroke-width', sw);
  document.getElementById('y-arms').setAttribute('points', `${cx-armX},${armY} ${cx},${juncY} ${cx+armX},${armY}`);
  document.getElementById('y-stem').setAttribute('x1', cx); document.getElementById('y-stem').setAttribute('y1', juncY);
  document.getElementById('y-stem').setAttribute('x2', cx); document.getElementById('y-stem').setAttribute('y2', 122);

  // Leaf
  const r = lw, t = ltip, b = lbase;
  const mid = (t + b) / 2;
  document.getElementById('leaf').setAttribute('d',
    `M ${cx},${t} C ${cx+r},${t+8} ${cx+r},${b-8} ${cx},${b} C ${cx-r},${b-8} ${cx-r},${t+8} ${cx},${t} Z`);
  document.getElementById('leaf').setAttribute('fill', lc);

  // Midrib
  const mr = document.getElementById('midrib');
  mr.setAttribute('x1', cx); mr.setAttribute('y1', t+1);
  mr.setAttribute('x2', cx); mr.setAttribute('y2', b-1);
  mr.setAttribute('stroke-width', '1.3');

  // Veins
  const vg = document.getElementById('vein-group');
  vg.innerHTML = '';
  if (showV) {
    const q1 = t + (b-t)*0.3, q2 = t + (b-t)*0.6;
    const vw = lw * 0.55;
    [[q1, vw*0.7],[q2, vw*0.5]].forEach(([y, dx]) => {
      ['L','R'].forEach(side => {
        const sign = side === 'L' ? -1 : 1;
        const p = document.createElementNS('http://www.w3.org/2000/svg','path');
        p.setAttribute('d', `M ${cx},${y} C ${cx+sign*dx*0.4},${y+4} ${cx+sign*dx*0.8},${y+8} ${cx+sign*dx},${y+14}`);
        p.setAttribute('stroke', darken(lc));
        p.setAttribute('stroke-width', '0.9');
        vg.appendChild(p);
      });
    });
  }

  // Output
  document.getElementById('out').value = document.getElementById('logo').outerHTML;
}

function darken(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*0.5)},${Math.round(g*0.5)},${Math.round(b*0.5)})`;
}

function copysvg() {
  navigator.clipboard.writeText(document.getElementById('out').value);
  alert('SVG copied to clipboard');
}

draw();
</script>
</body>
</html>
